<a class="card" [routerLink]="['/product', product().slug]">
  <div class="media">
    <app-product-image [name]="product().name" [accent]="product().accentColor" />
    <span class="chip">{{ product().orders }} orders</span>
  </div>

  <div class="body">
    <h3 class="name">{{ product().name }}</h3>
    <p class="tagline">{{ product().tagline }}</p>

    <div class="rating" aria-hidden="true">
      <span class="star">★</span>
      <span>{{ product().rating }}</span>
      <span class="muted">({{ product().ratingCount }})</span>
    </div>

    <div class="foot">
      <span class="price">
        <small>from</small> {{ product().priceMin | money }}
      </span>
      <button
        type="button"
        class="add"
        [class.add--done]="added()"
        (click)="addToCart($event)"
      >
        {{ added() ? 'Added ✓' : 'Add' }}
      </button>
    </div>
  </div>
</a>
